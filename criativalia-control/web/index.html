<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criativalia Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: white; }
        
        .app { display: flex; min-height: 100vh; }
        
        /* SIDEBAR - SEMPRE VISÍVEL NO DESKTOP */
        #sidebar {
            width: 260px;
            background: #12121a;
            border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text { font-size: 20px; font-weight: 700; color: #D4AF37; }
        
        .nav { padding: 20px 16px; }
        
        .nav-title {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            color: #9ca3af;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 4px;
            font-size: 15px;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(212,175,55,0.15);
            color: #D4AF37;
        }
        
        .nav-item i { width: 20px; text-align: center; }
        
        /* MAIN */
        .main {
            flex: 1;
            margin-left: 260px;
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            height: 70px;
            background: rgba(10,10,15,0.98);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
        }
        
        #menuBtn {
            display: none;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin-right: 16px;
        }
        
        .header-title { font-size: 20px; font-weight: 600; }
        
        /* CONTENT */
        .content { padding: 32px; max-width: 1200px; }
        .page-title { font-size: 32px; margin-bottom: 8px; }
        .page-title span { color: #D4AF37; }
        .page-desc { color: #6b7280; margin-bottom: 32px; }
        
        /* CARDS */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        
        .card {
            background: #1a1a25;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: white;
            display: block;
        }
        
        .card:hover { transform: translateY(-4px); border-color: rgba(212,175,55,0.3); }
        
        .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .card-icon.gold { background: rgba(212,175,55,0.2); color: #D4AF37; }
        .card-icon.red { background: rgba(229,9,20,0.2); color: #E50914; }
        
        .card-title { font-size: 22px; margin-bottom: 4px; }
        .card-subtitle { color: #6b7280; font-size: 14px; }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 12px;
        }
        
        .badge-gold { background: rgba(212,175,55,0.2); color: #D4AF37; }
        .badge-red { background: rgba(229,9,20,0.2); color: #E50914; }
        
        .features { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
        
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #9ca3af;
        }
        
        /* OVERLAY */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        
        /* MOBILE */
        @media screen and (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%);
            }
            #sidebar.visible {
                transform: translateX(0);
            }
            .main {
                margin-left: 0;
            }
            #menuBtn {
                display: block;
            }
            .content {
                padding: 20px;
            }
            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="closeMenu()"></div>
    
    <div class="app">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <div class="logo-text">CRIATIVALIA</div>
            </div>
            
            <div class="nav">
                <div class="nav-title">Menu</div>
                
                <a href="#" class="nav-item active">
                    <i class="fas fa-home"></i> Hub de Produtos
                </a>
                
                <a href="http://72.62.140.110:8889" class="nav-item">
                    <i class="fas fa-gem"></i> Centro de Controle
                </a>
                
                <a href="http://72.62.140.110:7777" class="nav-item">
                    <i class="fas fa-paper-plane"></i> Agência de Marketing
                </a>
            </div>
        </nav>
        
        <div class="main">
            <header class="header">
                <button id="menuBtn" type="button">☰</button>
                <div class="header-title">Hub de Produtos</div>
            </header>
            
            <div class="content">
                <h1 class="page-title">Seus <span>Negócios</span></h1>
                <p class="page-desc">Gerencie a Criativalia e sua Agência em um só lugar</p>
                
                <div class="cards">
                    <a href="http://72.62.140.110:8889" class="card">
                        <div class="card-header">
                            <div class="card-icon gold"><i class="fas fa-gem"></i></div>
                            <div>
                                <div class="card-title">Criativalia</div>
                                <div class="card-subtitle">Centro de Controle</div>
                            </div>
                        </div>
                        <span class="badge badge-gold">Principal</span>
                        <div class="features">
                            <span class="feature">Produção</span>
                            <span class="feature">Financeiro</span>
                        </div>
                    </a>
                    
                    <a href="http://72.62.140.110:7777" class="card">
                        <div class="card-header">
                            <div class="card-icon red"><i class="fas fa-paper-plane"></i></div>
                            <div>
                                <div class="card-title">Agência de Marketing</div>
                                <div class="card-subtitle">WhatsApp & Automação</div>
                            </div>
                        </div>
                        <span class="badge badge-red">v7.0 PRO</span>
                        <div class="features">
                            <span class="feature">Automação</span>
                            <span class="feature">Campanhas</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Menu toggle - versão com proteção
        var menuOpen = false;
        
        function initMenu() {
            var menuBtn = document.getElementById('menuBtn');
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('overlay');
            
            if (!menuBtn || !sidebar) {
                console.log('Elementos não encontrados');
                return;
            }
            
            menuBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if (menuOpen) {
                    sidebar.classList.remove('visible');
                    overlay.style.display = 'none';
                    menuOpen = false;
                } else {
                    sidebar.classList.add('visible');
                    overlay.style.display = 'block';
                    menuOpen = true;
                }
            });
            
            console.log('Menu inicializado');
        }
        
        // Inicializa quando DOM estiver pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initMenu);
        } else {
            initMenu();
        }
        
        function closeMenu() {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('overlay');
            if (sidebar) sidebar.classList.remove('visible');
            if (overlay) overlay.style.display = 'none';
            menuOpen = false;
        }
    </script>
</body>
</html>
