version: '3.8'

services:
  # API Principal
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: central-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=sqlite:///app/data/central.db
      - REDIS_URL=redis://redis:6379
      - EVOLUTION_API_URL=http://evolution-api:8080
    env_file:
      - ./config/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - redis
      - evolution-api
    networks:
      - central-network

  # Worker de Disparos
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: central-worker
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=sqlite:///app/data/central.db
      - REDIS_URL=redis://redis:6379
      - EVOLUTION_API_URL=http://evolution-api:8080
    env_file:
      - ./config/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      - redis
      - api
      - evolution-api
    networks:
      - central-network
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Web Interface
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: central-web
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - api
    networks:
      - central-network

  # Evolution API
  evolution-api:
    image: atendai/evolution-api:v2.0.0
    container_name: central-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-central_disparos_key}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - LANGUAGE=pt-BR
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1015901307
      - CONFIG_SESSION_PHONE_PLATFORM=Chrome
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@postgres:5432/evolution?schema=public
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
    networks:
      - central-network

  # PostgreSQL para Evolution
  postgres:
    image: postgres:15-alpine
    container_name: central-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - central-network

  # Redis para filas
  redis:
    image: redis:7-alpine
    container_name: central-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - central-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: central-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - central-network

volumes:
  evolution_instances:
  postgres_data:
  redis_data:

networks:
  central-network:
    driver: bridge
