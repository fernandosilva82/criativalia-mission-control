<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Criativalia Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/criativalia-theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background: var(--cri-bg-primary);
            color: var(--cri-text-primary);
        }
        
        .agent-card {
            transition: all var(--cri-transition-normal);
        }
        
        .agent-card:hover {
            transform: translateY(-2px);
            border-color: var(--cri-gold);
        }
        
        .agent-avatar {
            background: linear-gradient(135deg, var(--cri-olive-muted), var(--cri-gold-muted));
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-[var(--cri-border)] bg-[var(--cri-bg-secondary)] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo Criativalia -->
                <a href="/" class="cri-logo cri-logo--small">
                    <div class="cri-logo__icon cri-logo__icon--small">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="cri-logo__text">
                        <span class="cri-logo__brand">Criativalia</span>
                        <span class="cri-logo__tagline">Dashboard</span>
                    </div>
                </a>
                
                <div class="flex items-center gap-3">
                    <div class="px-4 py-2 rounded-lg bg-[var(--cri-olive-muted)] border border-[var(--cri-olive-primary)]/30">
                        <div class="flex items-center gap-2 text-xs">
                            <span class="cri-status cri-status--online"></span>
                            <span class="text-[var(--cri-olive-light)] font-medium">Sistema Online</span>
                        </div>
                    </div>
                    <button onclick="refreshData()" class="cri-btn cri-btn--secondary cri-btn--icon">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="cri-card cri-card--gradient p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider">Receita MTD</span>
                    <i class="fas fa-dollar-sign text-[var(--cri-gold)]"></i>
                </div>
                <div id="stat-revenue" class="text-xl font-bold">-</div>
            </div>
            
            <div class="cri-card cri-card--gradient p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider">Pedidos</span>
                    <i class="fas fa-shopping-bag text-[var(--cri-olive-primary)]"></i>
                </div>
                <div id="stat-orders" class="text-xl font-bold">-</div>
            </div>
            
            <div class="cri-card cri-card--gradient p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider">Ticket Médio</span>
                    <i class="fas fa-receipt text-[var(--cri-info)]"></i>
                </div>
                <div id="stat-aov" class="text-xl font-bold">-</div>
            </div>
            
            <div class="cri-card cri-card--gradient p-5">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider">Conversão</span>
                    <i class="fas fa-percentage text-[var(--cri-gold)]"></i>
                </div>
                <div id="stat-conversion" class="text-xl font-bold">-</div>
            </div>
        </div>

        <!-- Active Agents -->
        <section class="mb-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">Agentes Ativos</h2>
                <span id="agents-count" class="cri-badge cri-badge--neutral">0 agentes</span>
            </div>
            
            <div id="agents-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Skeleton loading -->
                <div class="cri-card p-5">
                    <div class="flex items-center gap-4">
                        <div class="cri-skeleton w-12 h-12 rounded-xl"></div>
                        <div class="flex-1">
                            <div class="cri-skeleton h-4 w-32 mb-2"></div>
                            <div class="cri-skeleton h-3 w-24"></div>
                        </div>
                    </div>
                </div>
                <div class="cri-card p-5">
                    <div class="flex items-center gap-4">
                        <div class="cri-skeleton w-12 h-12 rounded-xl"></div>
                        <div class="flex-1">
                            <div class="cri-skeleton h-4 w-32 mb-2"></div>
                            <div class="cri-skeleton h-3 w-24"></div>
                        </div>
                    </div>
                </div>
                <div class="cri-card p-5">
                    <div class="flex items-center gap-4">
                        <div class="cri-skeleton w-12 h-12 rounded-xl"></div>
                        <div class="flex-1">
                            <div class="cri-skeleton h-4 w-32 mb-2"></div>
                            <div class="cri-skeleton h-3 w-24"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Recent Tasks -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">Tarefas Recentes</h2>
                <a href="kanban.html" class="cri-btn cri-btn--secondary cri-btn--sm">
                    Ver Kanban <i class="fas fa-arrow-right ml-2"></i>
                </a>
            </div>
            
            <div class="cri-card overflow-hidden">
                <div id="tasks-list" class="divide-y divide-[var(--cri-border)]">
                    <!-- Tasks serão renderizadas aqui -->
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
        });

        async function refreshData() {
            try {
                const [agentsRes, tasksRes, shopifyRes] = await Promise.all([
                    fetch('/api/agents').catch(() => null),
                    fetch('/api/tasks').catch(() => null),
                    fetch('/api/shopify/stats').catch(() => null)
                ]);

                const agents = agentsRes ? await agentsRes.json() : [];
                const tasks = tasksRes ? await tasksRes.json() : [];
                const shopify = shopifyRes ? await shopifyRes.json() : {};

                // Update stats
                document.getElementById('stat-revenue').textContent = 
                    'R$ ' + (shopify.revenue_mtd || 0).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
                document.getElementById('stat-orders').textContent = (shopify.orders_mtd || 0).toLocaleString('pt-BR');
                document.getElementById('stat-aov').textContent = 
                    'R$ ' + (shopify.aov || 0).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
                document.getElementById('stat-conversion').textContent = (shopify.conversion_rate || 0).toFixed(1) + '%';

                // Render agents
                renderAgents(agents);

                // Render tasks
                renderTasks(tasks.slice(0, 5));

            } catch (err) {
                console.error('Error loading data:', err);
            }
        }

        function renderAgents(agents) {
            const container = document.getElementById('agents-grid');
            document.getElementById('agents-count').textContent = `${agents.length} agentes`;
            
            if (agents.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full cri-empty-state py-12">
                        <i class="fas fa-robot"></i>
                        <p>Nenhum agente ativo</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = agents.map(agent => `
                <div class="agent-card cri-card p-5">
                    <div class="flex items-center gap-4">
                        <div class="agent-avatar w-12 h-12 rounded-xl flex items-center justify-center text-xl">
                            ${getAgentIcon(agent.role)}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold truncate">${agent.name}</h3>
                            <p class="text-sm text-[var(--cri-text-muted)]">${agent.role}</p>
                        </div>
                        <span class="cri-status cri-status--${agent.status === 'active' ? 'online' : 'offline'}"></span>
                    </div>
                    <div class="mt-4 flex items-center gap-4 text-xs text-[var(--cri-text-muted)]">
                        <span class="flex items-center gap-1">
                            <i class="fas fa-tasks"></i>
                            ${agent.tasks_count || 0} tarefas
                        </span>
                        <span class="flex items-center gap-1">
                            <i class="fas fa-check-circle"></i>
                            ${agent.completed_tasks || 0} concluídas
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasks-list');
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="p-6 text-center text-[var(--cri-text-muted)]">
                        <i class="fas fa-inbox text-3xl mb-3"></i>
                        <p>Nenhuma tarefa recente</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="p-4 flex items-center gap-4 hover:bg-[var(--cri-bg-hover)] transition">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-medium truncate">${task.title}</h4>
                        <p class="text-sm text-[var(--cri-text-muted)]">
                            ${task.status.replace(/_/g, ' ')} • P${task.priority || 5}
                        </p>
                    </div>
                    <span class="cri-badge cri-badge--${getStatusColor(task.status)}">
                        ${task.status.replace(/_/g, ' ')}
                    </span>
                </div>
            `).join('');
        }

        function getAgentIcon(role) {
            if (role?.includes('CEO')) return '👑';
            if (role?.includes('Traffic')) return '📢';
            if (role?.includes('Shopify')) return '🛒';
            if (role?.includes('Copy')) return '✍️';
            if (role?.includes('Design')) return '🎨';
            if (role?.includes('Dev')) return '💻';
            if (role?.includes('Data')) return '📊';
            if (role?.includes('Support')) return '🎧';
            return '🤖';
        }

        function getStatusColor(status) {
            if (status === 'done') return 'success';
            if (status === 'in_progress') return 'warning';
            if (status === 'ready_to_deploy') return 'info';
            return 'neutral';
        }
    </script>
</body>
</html>
