<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban - Criativalia Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/criativalia-theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background: var(--cri-bg-primary);
            color: var(--cri-text-primary);
        }
        
        .kanban-column {
            background: var(--cri-bg-secondary);
            border: 1px solid var(--cri-border);
            border-radius: var(--cri-radius-lg);
            min-width: 280px;
            max-width: 280px;
        }
        
        .kanban-column.drag-over {
            border-color: var(--cri-gold);
            background: rgba(212, 168, 83, 0.05);
        }
        
        .kanban-card {
            background: var(--cri-bg-tertiary);
            border: 1px solid var(--cri-border);
            border-radius: var(--cri-radius-md);
            cursor: grab;
            transition: all var(--cri-transition-normal);
        }
        
        .kanban-card:hover {
            border-color: var(--cri-gold);
            transform: translateY(-2px);
            box-shadow: var(--cri-shadow-md);
        }
        
        .kanban-card.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
        }
        
        .priority-1, .priority-2 { border-left: 3px solid var(--cri-olive-primary); }
        .priority-3, .priority-4, .priority-5 { border-left: 3px solid var(--cri-gold); }
        .priority-6, .priority-7, .priority-8 { border-left: 3px solid var(--cri-error); }
        .priority-9, .priority-10 { border-left: 3px solid #e74c3c; }
        
        .column-header { border-top: 3px solid var(--cri-border); }
        .column-header-inbox { border-top-color: var(--cri-text-muted); }
        .column-header-opportunity { border-top-color: #9b59b6; }
        .column-header-ready { border-top-color: var(--cri-info); }
        .column-header-progress { border-top-color: var(--cri-gold); }
        .column-header-review { border-top-color: var(--cri-error); }
        .column-header-deploy { border-top-color: #1abc9c; }
        .column-header-done { border-top-color: var(--cri-olive-primary); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-[var(--cri-border)] bg-[var(--cri-bg-secondary)] sticky top-0 z-50">
        <div class="max-w-full mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo Criativalia -->
                <a href="/" class="cri-logo cri-logo--small">
                    <div class="cri-logo__icon cri-logo__icon--small">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="cri-logo__text">
                        <span class="cri-logo__brand">Criativalia</span>
                        <span class="cri-logo__tagline">Kanban Board</span>
                    </div>
                </a>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 text-sm text-[var(--cri-text-muted)]">
                        <i class="fas fa-info-circle"></i>
                        <span>Arraste os cards entre as colunas</span>
                    </div>
                    <button onclick="refreshBoard()" class="cri-btn cri-btn--secondary cri-btn--icon">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <a href="/" class="cri-btn cri-btn--secondary cri-btn--icon">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Kanban Board -->
    <main class="p-6 overflow-x-auto">
        <div class="flex gap-4 min-w-max pb-4" id="kanban-board">
            <!-- Colunas serão renderizadas aqui -->
        </div>
    </main>

    <!-- Task Detail Modal -->
    <div id="task-modal" class="cri-modal-overlay hidden">
        <div class="cri-modal">
            <div class="cri-modal__header">
                <h3 class="cri-modal__title">Detalhes da Tarefa</h3>
                <button onclick="closeModal()" class="cri-modal__close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-content" class="cri-modal__body">
                <!-- Conteúdo -->
            </div>
        </div>
    </div>

    <script>
        const COLUMNS = [
            { id: 'inbox', name: 'Inbox', headerClass: 'column-header-inbox', icon: 'fa-inbox' },
            { id: 'opportunity_review', name: 'Opportunity Review', headerClass: 'column-header-opportunity', icon: 'fa-search' },
            { id: 'ready', name: 'Ready', headerClass: 'column-header-ready', icon: 'fa-clipboard-check' },
            { id: 'in_progress', name: 'In Progress', headerClass: 'column-header-progress', icon: 'fa-spinner' },
            { id: 'review', name: 'Review', headerClass: 'column-header-review', icon: 'fa-eye' },
            { id: 'ready_to_deploy', name: 'Ready to Deploy', headerClass: 'column-header-deploy', icon: 'fa-rocket' },
            { id: 'done', name: 'Done', headerClass: 'column-header-done', icon: 'fa-check-circle' }
        ];

        let tasks = [];
        let agents = [];
        let draggedTask = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadBoard();
        });

        async function loadBoard() {
            try {
                const [tasksRes, agentsRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/agents')
                ]);
                
                tasks = await tasksRes.json();
                agents = await agentsRes.json();
                
                renderBoard();
            } catch (err) {
                console.error('Error loading board:', err);
                document.getElementById('kanban-board').innerHTML = `
                    <div class="cri-empty-state py-12">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Erro ao carregar o board</p>
                        <button onclick="loadBoard()" class="cri-btn cri-btn--primary mt-4">
                            <i class="fas fa-sync-alt mr-2"></i>Tentar novamente
                        </button>
                    </div>
                `;
            }
        }

        function renderBoard() {
            const board = document.getElementById('kanban-board');
            board.innerHTML = COLUMNS.map(col => {
                const colTasks = tasks.filter(t => t.status === col.id);
                return `
                    <div class="kanban-column column-header ${col.headerClass}" 
                         data-column="${col.id}"
                         ondrop="handleDrop(event, '${col.id}')" 
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)">
                        <div class="p-3 border-b border-[var(--cri-border)]">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <i class="fas ${col.icon} text-[var(--cri-text-muted)]"></i>
                                    <span class="font-semibold text-sm">${col.name}</span>
                                </div>
                                <span class="cri-badge cri-badge--neutral">${colTasks.length}</span>
                            </div>
                        </div>
                        <div class="p-2 space-y-2 min-h-[200px]" id="column-${col.id}">
                            ${colTasks.map(task => renderTaskCard(task)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTaskCard(task) {
            const agent = agents.find(a => a.id === task.agent_id);
            const priority = task.priority || 5;
            return `
                <div class="kanban-card p-3 priority-${priority}"
                     draggable="true"
                     data-task-id="${task.id}"
                     ondragstart="handleDragStart(event, '${task.id}')"
                     ondragend="handleDragEnd(event)"
                     onclick="viewTask('${task.id}')">
                    <div class="flex items-start justify-between mb-2">
                        <span class="text-[10px] bg-[var(--cri-bg-secondary)] px-1.5 py-0.5 rounded text-[var(--cri-text-muted)]">P${priority}</span>
                        ${task.deliverables?.length ? `
                            <span class="text-[10px] text-[var(--cri-text-muted)]">
                                <i class="fas fa-paperclip mr-1"></i>${task.deliverables.length}
                            </span>
                        ` : ''}
                    </div>
                    <h4 class="font-medium text-sm mb-2 line-clamp-2">${task.title}</h4>
                    <div class="flex items-center justify-between text-xs text-[var(--cri-text-muted)]">
                        <span class="flex items-center gap-1">
                            <i class="fas fa-robot text-[10px]"></i>
                            ${agent?.name || 'Unassigned'}
                        </span>
                        <span>${formatDate(task.created_at)}</span>
                    </div>
                </div>
            `;
        }

        function handleDragStart(e, taskId) {
            draggedTask = tasks.find(t => t.id === taskId);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(col => {
                col.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const column = e.currentTarget;
            column.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            const column = e.currentTarget;
            if (!column.contains(e.relatedTarget)) {
                column.classList.remove('drag-over');
            }
        }

        async function handleDrop(e, newStatus) {
            e.preventDefault();
            const column = e.currentTarget;
            column.classList.remove('drag-over');
            
            if (!draggedTask || draggedTask.status === newStatus) return;
            
            try {
                const res = await fetch(`/api/tasks/${draggedTask.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (res.ok) {
                    draggedTask.status = newStatus;
                    renderBoard();
                }
            } catch (err) {
                console.error('Error updating task:', err);
            }
            
            draggedTask = null;
        }

        function viewTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const agent = agents.find(a => a.id === task.agent_id);
            
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="cri-label">Título</label>
                        <h2 class="text-lg font-bold mt-1">${task.title}</h2>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="cri-label">Status</label>
                            <p class="mt-1">
                                <span class="cri-badge cri-badge--neutral">${task.status.replace(/_/g, ' ')}</span>
                            </p>
                        </div>
                        <div>
                            <label class="cri-label">Prioridade</label>
                            <p class="mt-1 flex items-center gap-2">
                                <span class="text-lg font-bold">${task.priority || 5}</span>
                                <span class="text-xs text-[var(--cri-text-muted)]">/ 10</span>
                            </p>
                        </div>
                    </div>
                    
                    <div>
                        <label class="cri-label">Agente</label>
                        <p class="mt-1 flex items-center gap-2">
                            <i class="fas fa-robot text-[var(--cri-text-muted)]"></i>
                            ${agent?.name || 'Unassigned'}
                            <span class="text-[var(--cri-text-muted)]">(${agent?.role || 'Unknown'})</span>
                        </p>
                    </div>
                    
                    <div>
                        <label class="cri-label">Descrição</label>
                        <p class="mt-1 text-[var(--cri-text-secondary)] whitespace-pre-wrap">${task.description || 'Sem descrição'}</p>
                    </div>
                    
                    ${task.deliverables?.length ? `
                        <div>
                            <label class="cri-label">Deliverables</label>
                            <ul class="mt-1 space-y-1">
                                ${task.deliverables.map(d => `
                                    <li class="text-sm text-[var(--cri-text-secondary)]">
                                        <i class="fas fa-check text-[var(--cri-olive-primary)] mr-2"></i>${d}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    ` : ''}
                    
                    <div class="grid grid-cols-2 gap-4 text-xs text-[var(--cri-text-muted)]">
                        <div>
                            <label class="cri-label">Criado</label>
                            <p>${formatFullDate(task.created_at)}</p>
                        </div>
                        ${task.started_at ? `
                            <div>
                                <label class="cri-label">Iniciado</label>
                                <p>${formatFullDate(task.started_at)}</p>
                            </div>
                        ` : ''}
                        ${task.completed_at ? `
                            <div>
                                <label class="cri-label">Concluído</label>
                                <p>${formatFullDate(task.completed_at)}</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            document.getElementById('task-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('task-modal').classList.add('hidden');
        }

        function refreshBoard() {
            loadBoard();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            if (diff === 0) return 'Hoje';
            if (diff === 1) return 'Ontem';
            if (diff < 7) return `${diff}d`;
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }

        function formatFullDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString('pt-BR');
        }

        // Close modal on outside click
        document.getElementById('task-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });
    </script>
</body>
</html>
