<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheet - Criativalia Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/criativalia-theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background: var(--cri-bg-primary);
            color: var(--cri-text-primary);
        }
        
        .timeline-grid {
            display: grid;
            grid-template-columns: 150px repeat(24, 60px);
            gap: 1px;
            background: var(--cri-bg-tertiary);
        }
        
        .timeline-header {
            background: var(--cri-bg-secondary);
            padding: 12px 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            border-bottom: 1px solid var(--cri-border);
        }
        
        .timeline-hour {
            background: var(--cri-bg-secondary);
            padding: 12px 4px;
            text-align: center;
            font-size: 11px;
            color: var(--cri-text-muted);
            border-bottom: 1px solid var(--cri-border);
            border-left: 1px solid var(--cri-bg-tertiary);
        }
        
        .timeline-hour.current {
            background: var(--cri-gold-muted);
            color: var(--cri-gold);
            font-weight: 600;
        }
        
        .agent-row { display: contents; }
        
        .agent-name {
            background: var(--cri-bg-secondary);
            padding: 12px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 1px solid var(--cri-border);
        }
        
        .time-cell {
            background: var(--cri-bg-primary);
            border-left: 1px solid var(--cri-bg-tertiary);
            min-height: 50px;
            position: relative;
        }
        
        .activity-bar {
            position: absolute;
            left: 2px;
            right: 2px;
            border-radius: 4px;
            font-size: 9px;
            padding: 2px 4px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all var(--cri-transition-fast);
        }
        
        .activity-bar:hover {
            z-index: 100;
            transform: scale(1.05);
            box-shadow: var(--cri-shadow-md);
        }
        
        .activity-session { background: var(--cri-olive-primary); color: var(--cri-text-primary); }
        .activity-task { background: var(--cri-gold); color: var(--cri-text-inverse); }
        .activity-log { background: var(--cri-info); color: white; }
        
        .current-time-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--cri-gold);
            z-index: 50;
            pointer-events: none;
        }
        
        .current-time-line::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -3px;
            width: 8px;
            height: 8px;
            background: var(--cri-gold);
            border-radius: 50%;
        }
        
        .code-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-[var(--cri-border)] bg-[var(--cri-bg-secondary)] sticky top-0 z-50">
        <div class="max-w-full mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo Criativalia -->
                <a href="/" class="cri-logo cri-logo--small">
                    <div class="cri-logo__icon cri-logo__icon--small">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="cri-logo__text">
                        <span class="cri-logo__brand">Criativalia</span>
                        <span class="cri-logo__tagline">Timesheet</span>
                    </div>
                </a>
                
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-4 text-xs">
                        <span class="flex items-center gap-1">
                            <span class="w-3 h-3 rounded bg-[var(--cri-olive-primary)]"></span> Session
                        </span>
                        <span class="flex items-center gap-1">
                            <span class="w-3 h-3 rounded bg-[var(--cri-gold)]"></span> Task
                        </span>
                        <span class="flex items-center gap-1">
                            <span class="w-3 h-3 rounded bg-[var(--cri-info)]"></span> Log
                        </span>
                    </div>
                    <button onclick="refreshTimesheet()" class="cri-btn cri-btn--secondary cri-btn--icon">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <a href="/" class="cri-btn cri-btn--secondary cri-btn--icon">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Timesheet -->
    <main class="p-6">
        <div class="cri-card overflow-hidden">
            <div class="overflow-x-auto" id="timeline-container">
                <div class="timeline-grid" id="timeline-grid">
                    <!-- Timeline será renderizado aqui -->
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
            <div class="cri-card cri-card--gradient p-4">
                <div class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider mb-1">Total Sessions</div>
                <div id="stat-sessions" class="text-2xl font-bold">-</div>
            </div>
            <div class="cri-card cri-card--gradient p-4">
                <div class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider mb-1">Active Now</div>
                <div id="stat-active" class="text-2xl font-bold text-[var(--cri-olive-light)]">-</div>
            </div>
            <div class="cri-card cri-card--gradient p-4">
                <div class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider mb-1">Tasks Completed</div>
                <div id="stat-completed" class="text-2xl font-bold text-[var(--cri-gold)]">-</div>
            </div>
            <div class="cri-card cri-card--gradient p-4">
                <div class="text-[var(--cri-text-muted)] text-xs uppercase tracking-wider mb-1">Total Logs</div>
                <div id="stat-logs" class="text-2xl font-bold">-</div>
            </div>
        </div>
    </main>

    <!-- Activity Detail Modal -->
    <div id="activity-modal" class="cri-modal-overlay hidden">
        <div class="cri-modal">
            <div class="cri-modal__header">
                <h3 class="cri-modal__title">Detalhes da Atividade</h3>
                <button onclick="closeModal()" class="cri-modal__close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-content" class="cri-modal__body">
                <!-- Conteúdo -->
            </div>
        </div>
    </div>

    <script>
        let sessions = [];
        let tasks = [];
        let logs = [];
        let agents = [];
        let currentHour = new Date().getHours();

        document.addEventListener('DOMContentLoaded', () => {
            loadTimesheet();
            setInterval(updateCurrentTimeLine, 60000);
        });

        async function loadTimesheet() {
            try {
                const [sessionsRes, tasksRes, logsRes, agentsRes] = await Promise.all([
                    fetch('/api/sessions'),
                    fetch('/api/tasks'),
                    fetch('/api/logs?limit=200'),
                    fetch('/api/agents')
                ]);
                
                sessions = await sessionsRes.json();
                tasks = await tasksRes.json();
                logs = await logsRes.json();
                agents = await agentsRes.json();
                
                renderTimeline();
                updateStats();
            } catch (err) {
                console.error('Error loading timesheet:', err);
                document.getElementById('timeline-grid').innerHTML = `
                    <div class="col-span-full cri-empty-state py-12">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Erro ao carregar o timesheet</p>
                        <button onclick="loadTimesheet()" class="cri-btn cri-btn--primary mt-4">
                            <i class="fas fa-sync-alt mr-2"></i>Tentar novamente
                        </button>
                    </div>
                `;
            }
        }

        function renderTimeline() {
            const grid = document.getElementById('timeline-grid');
            const hours = Array.from({length: 24}, (_, i) => i);
            
            // Header row
            let html = '<div class="timeline-header sticky left-0 z-20">Agent</div>';
            hours.forEach(hour => {
                const isCurrent = hour === currentHour;
                html += `<div class="timeline-hour ${isCurrent ? 'current' : ''}" data-hour="${hour}">${String(hour).padStart(2, '0')}:00</div>`;
            });
            
            // Agent rows
            agents.forEach(agent => {
                html += `<div class="agent-name">${getAgentIcon(agent.role)} ${agent.name}</div>`;
                hours.forEach(hour => {
                    const activities = getActivitiesForHour(agent.id, hour);
                    html += `
                        <div class="time-cell" data-agent="${agent.id}" data-hour="${hour}">
                            ${activities.map(act => renderActivityBar(act, hour)).join('')}
                        </div>
                    `;
                });
            });
            
            grid.innerHTML = html;
            updateCurrentTimeLine();
        }

        function getActivitiesForHour(agentId, hour) {
            const activities = [];
            const hourStart = new Date();
            hourStart.setHours(hour, 0, 0, 0);
            const hourEnd = new Date();
            hourEnd.setHours(hour, 59, 59, 999);
            
            // Sessions
            sessions.filter(s => s.agent_id === agentId).forEach(session => {
                const start = new Date(session.started_at);
                if (start >= hourStart && start <= hourEnd) {
                    activities.push({
                        type: 'session',
                        title: 'Session started',
                        time: start,
                        data: session
                    });
                }
            });
            
            // Tasks
            tasks.filter(t => t.agent_id === agentId).forEach(task => {
                if (task.started_at) {
                    const start = new Date(task.started_at);
                    if (start >= hourStart && start <= hourEnd) {
                        activities.push({
                            type: 'task',
                            title: task.title,
                            time: start,
                            data: task
                        });
                    }
                }
            });
            
            // Logs
            logs.filter(l => l.agent_id === agentId).forEach(log => {
                const time = new Date(log.created_at);
                if (time >= hourStart && time <= hourEnd) {
                    activities.push({
                        type: 'log',
                        title: log.message.substring(0, 30) + '...',
                        time: time,
                        data: log
                    });
                }
            });
            
            return activities.sort((a, b) => a.time - b.time);
        }

        function renderActivityBar(activity, hour) {
            const minute = activity.time.getMinutes();
            const top = (minute / 60) * 100;
            const height = Math.max(20, 100 / Math.max(1, getActivitiesForHour(activity.data.agent_id || activity.data.agent_id, hour).length));
            
            return `
                <div class="activity-bar activity-${activity.type}" 
                     style="top: ${top}%; height: ${height}%;"
                     onclick="showActivityDetail('${activity.type}', '${activity.data.id || activity.data.id}')">
                    ${activity.title}
                </div>
            `;
        }

        function updateCurrentTimeLine() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            
            // Remove existing lines
            document.querySelectorAll('.current-time-line').forEach(el => el.remove());
            
            // Add new line
            const hourCell = document.querySelector(`.timeline-hour[data-hour="${currentHour}"]`);
            if (hourCell) {
                const line = document.createElement('div');
                line.className = 'current-time-line';
                line.style.left = `${hourCell.offsetLeft + (currentMinute / 60) * hourCell.offsetWidth}px`;
                document.getElementById('timeline-grid').appendChild(line);
            }
        }

        function updateStats() {
            document.getElementById('stat-sessions').textContent = sessions.length;
            document.getElementById('stat-active').textContent = sessions.filter(s => s.status === 'running').length;
            document.getElementById('stat-completed').textContent = tasks.filter(t => t.status === 'completed').length;
            document.getElementById('stat-logs').textContent = logs.length;
        }

        function showActivityDetail(type, id) {
            let data;
            let html;
            
            switch(type) {
                case 'session':
                    data = sessions.find(s => s.id === id);
                    if (!data) return;
                    html = `
                        <div class="space-y-3">
                            <div>
                                <label class="cri-label">Tipo</label>
                                <p>Session</p>
                            </div>
                            <div>
                                <label class="cri-label">ID</label>
                                <p class="code-font text-xs">${data.id}</p>
                            </div>
                            <div>
                                <label class="cri-label">Status</label>
                                <span class="cri-badge cri-badge--${data.status === 'running' ? 'success' : 'neutral'}">${data.status}</span>
                            </div>
                            <div>
                                <label class="cri-label">Iniciado</label>
                                <p>${new Date(data.started_at).toLocaleString('pt-BR')}</p>
                            </div>
                            ${data.completed_at ? `
                                <div>
                                    <label class="cri-label">Concluído</label>
                                    <p>${new Date(data.completed_at).toLocaleString('pt-BR')}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    break;
                case 'task':
                    data = tasks.find(t => t.id === id);
                    if (!data) return;
                    html = `
                        <div class="space-y-3">
                            <div>
                                <label class="cri-label">Tipo</label>
                                <p>Task</p>
                            </div>
                            <div>
                                <label class="cri-label">Título</label>
                                <p class="font-medium">${data.title}</p>
                            </div>
                            <div>
                                <label class="cri-label">Status</label>
                                <span class="cri-badge cri-badge--neutral">${data.status}</span>
                            </div>
                            <div>
                                <label class="cri-label">Prioridade</label>
                                <p>P${data.priority}</p>
                            </div>
                        </div>
                    `;
                    break;
                case 'log':
                    data = logs.find(l => l.id === id);
                    if (!data) return;
                    html = `
                        <div class="space-y-3">
                            <div>
                                <label class="cri-label">Tipo</label>
                                <p>Log Entry</p>
                            </div>
                            <div>
                                <label class="cri-label">Level</label>
                                <span class="cri-badge cri-badge--${data.level}">${data.level}</span>
                            </div>
                            <div>
                                <label class="cri-label">Mensagem</label>
                                <p>${data.message}</p>
                            </div>
                            <div>
                                <label class="cri-label">Hora</label>
                                <p>${new Date(data.created_at).toLocaleString('pt-BR')}</p>
                            </div>
                        </div>
                    `;
                    break;
            }
            
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('activity-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('activity-modal').classList.add('hidden');
        }

        function refreshTimesheet() {
            loadTimesheet();
        }

        function getAgentIcon(role) {
            if (role?.includes('CEO')) return '👑';
            if (role?.includes('Traffic')) return '📢';
            if (role?.includes('Shopify')) return '🛒';
            if (role?.includes('Copy')) return '✍️';
            if (role?.includes('Design')) return '🎨';
            if (role?.includes('Dev')) return '💻';
            if (role?.includes('Data')) return '📊';
            if (role?.includes('Support')) return '🎧';
            return '🤖';
        }

        // Close modal on outside click
        document.getElementById('activity-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });
    </script>
</body>
</html>
