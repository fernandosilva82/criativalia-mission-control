<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradiente principal verde oliva -->
    <linearGradient id="oliveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A6D33;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4A5D23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A4D13;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente dourado -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4B863;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A853;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra sutil -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fundo circular -->
  <circle cx="100" cy="100" r="90" fill="url(#oliveGradient)" filter="url(#shadow)"/>
  
  <!-- Folha estilizada (C de Criativalia) -->
  <path d="M100 35 
           C 70 35, 45 60, 45 95
           C 45 130, 70 155, 100 155
           C 120 155, 135 145, 145 130
           L 130 120
           C 123 130, 112 138, 100 138
           C 80 138, 65 120, 65 95
           C 65 70, 80 52, 100 52
           C 115 52, 125 60, 130 70
           L 145 60
           C 135 45, 120 35, 100 35Z" 
        fill="#F5F5DC"/>
  
  <!-- Elemento decorativo - círculo dourado -->
  <circle cx="140" cy="60" r="12" fill="url(#goldGradient)"/>
  
  <!-- Ponto decorativo -->
  <circle cx="100" cy="95" r="8" fill="#D4A853"/>
</svg>