<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Criativalia Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/criativalia-theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Criativalia Logo - Olive Leaf -->
                    <path d="M50 5C50 5 20 25 20 55C20 75 35 90 50 90C65 90 80 75 80 55C80 25 50 5 50 5Z" 
                          fill="url(#oliveGradient)" stroke="#F5F5DC" stroke-width="2"/>
                    <path d="M50 15C50 15 30 30 30 55C30 70 40 80 50 80C60 80 70 70 70 55C70 30 50 15 50 15Z" 
                          fill="url(#innerGradient)" opacity="0.6"/>
                    <line x1="50" y1="15" x2="50" y2="85" stroke="#D4A853" stroke-width="1.5"/>
                    <ellipse cx="35" cy="45" rx="8" ry="4" fill="#5A6D33" transform="rotate(-30 35 45)"/>
                    <ellipse cx="65" cy="50" rx="8" ry="4" fill="#5A6D33" transform="rotate(30 65 50)"/>
                    <ellipse cx="40" cy="65" rx="6" ry="3" fill="#5A6D33" transform="rotate(-45 40 65)"/>
                    <defs>
                        <linearGradient id="oliveGradient" x1="20%" y1="0%" x2="80%" y2="100%">
                            <stop offset="0%" stop-color="#4A5D23"/>
                            <stop offset="100%" stop-color="#D4A853"/>
                        </linearGradient>
                        <linearGradient id="innerGradient" x1="30%" y1="0%" x2="70%" y2="100%">
                            <stop offset="0%" stop-color="#5A6D33"/>
                            <stop offset="100%" stop-color="#4A5D23"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="logo-text">
                <div class="logo-brand">Criativalia</div>
                <div class="logo-tagline">Control Plane</div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-item active">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/kanban.html" class="sidebar-item">
                <i class="fas fa-columns"></i>
                <span>Kanban</span>
            </a>
            <a href="/timesheet.html" class="sidebar-item">
                <i class="fas fa-clock"></i>
                <span>Timesheet</span>
            </a>
            <a href="/deliverables.html" class="sidebar-item">
                <i class="fas fa-box"></i>
                <span>Entregas</span>
            </a>
            <a href="/dashboard.html" class="sidebar-item">
                <i class="fas fa-store"></i>
                <span>Shopify</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="agent-status">
                <div class="agent-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="agent-info">
                    <div class="agent-name">Multi-Agent</div>
                    <div class="agent-version">v2.0 • Online</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="hamburger" onclick="toggleSidebar()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div>
                        <h1 class="header-title">
                            <i class="fas fa-home"></i>
                            Dashboard
                        </h1>
                        <p class="header-subtitle">Multi-Agent Runtime v2.0</p>
                    </div>
                </div>
                <div class="header-right">
                    <div id="runtime-status" class="flex items-center gap-sm" style="color: var(--text-primary);">
                        <span class="status-dot online"></span>
                        <span>Running</span>
                    </div>
                    <button onclick="refreshData()" class="btn btn-primary btn-icon">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="container">
            <!-- Stats Grid -->
            <div class="grid grid-cols-4 mb-lg">
                <div class="stat-card success">
                    <div class="stat-label">Active Agents</div>
                    <div id="stat-agents" class="stat-value">-</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-label">Active Tasks</div>
                    <div id="stat-tasks" class="stat-value">-</div>
                </div>
                <div class="stat-card info">
                    <div class="stat-label">Sessions</div>
                    <div id="stat-sessions" class="stat-value">-</div>
                </div>
                <div class="stat-card error">
                    <div class="stat-label">Pending Review</div>
                    <div id="stat-review" class="stat-value" style="color: var(--status-error);">-</div>
                </div>
            </div>
            
            <!-- Agent List Section -->
            <div class="card mb-lg">
                <div class="card-header">
                    <h2 class="card-title">
                        <i class="fas fa-robot"></i>
                        Agents
                    </h2>
                    <button onclick="loadAgents()" class="btn btn-primary btn-sm">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
                <div id="agents-list" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
                    <!-- Agents loaded here -->
                </div>
            </div>

            <!-- Footer -->
            <div class="app-footer">
                <i class="fas fa-leaf"></i>
                Criativalia Control Plane v2.0 — Sistema Multi-Agente Autônomo
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() { 
            const s = document.getElementById('sidebar'), o = document.getElementById('sidebarOverlay'); 
            s.classList.toggle('open'); 
            o.classList.toggle('open'); 
        }
        
        async function refreshData() { 
            try { 
                const r = await fetch('/api/state'); 
                const d = await r.json(); 
                document.getElementById('stat-agents').textContent = d.active_agents || 0; 
                document.getElementById('stat-tasks').textContent = d.active_tasks || 0; 
                document.getElementById('stat-sessions').textContent = d.active_sessions || 0; 
                document.getElementById('stat-review').textContent = d.pending_review || 0; 
            } catch(e) {
                console.error('Error refreshing data:', e);
            } 
        }
        
        async function loadAgents() {
            try {
                const r = await fetch('/api/agents');
                const data = await r.json();
                const agents = data.agents || [];
                const container = document.getElementById('agents-list');
                
                if (agents.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="fas fa-robot"></i>
                            <p>Nenhum agente encontrado</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = agents.map(agent => `
                    <div class="card agent-card ${agent.status}">
                        <div class="agent-card-header">
                            <div class="agent-card-name">${agent.name}</div>
                            <span class="agent-card-status ${agent.status}">
                                ${agent.status === 'running' ? '🔥 RUNNING' : '⏳ IDLE'}
                            </span>
                        </div>
                        <div class="agent-card-role">${agent.role}</div>
                        <div class="agent-card-meta">
                            ${agent.time_until_next_min ? `Next in ${agent.time_until_next_min}min` : 'Waiting...'}
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('agents-list').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1; color: var(--status-error);">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Erro ao carregar agents</p>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            loadAgents();
            
            // Auto-refresh every 30 seconds
            setInterval(refreshData, 30000);
        });
    </script>
</body>
</html>
