<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas - Criativalia Control Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Criativalia Theme CSS -->
    <link rel="stylesheet" href="css/criativalia-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="js/deliverables-data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--cri-bg-primary); 
            color: var(--cri-text-primary); 
        }
        
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        /* File icons com tema Criativalia */
        .file-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--cri-radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .file-md { background: rgba(66, 153, 225, 0.15); color: #4299e1; }
        .file-json { background: rgba(212, 168, 83, 0.15); color: var(--cri-gold); }
        .file-js { background: rgba(246, 224, 94, 0.15); color: #f6e05e; }
        .file-py { background: rgba(74, 93, 35, 0.2); color: var(--cri-olive-light); }
        .file-csv { background: rgba(90, 159, 212, 0.15); color: var(--cri-info); }
        .file-img { background: rgba(193, 119, 103, 0.15); color: var(--cri-error); }
        .file-code { background: var(--cri-bg-tertiary); color: var(--cri-text-muted); }
        
        .preview-panel {
            background: var(--cri-bg-primary);
            border-left: 1px solid var(--cri-border);
        }
        
        .deliverable-item {
            cursor: pointer;
            transition: all var(--cri-transition-fast);
        }
        
        .deliverable-item:hover {
            background: var(--cri-bg-hover);
            border-color: var(--cri-gold);
        }
        
        .deliverable-item.active {
            background: var(--cri-gold-muted);
            border-left: 3px solid var(--cri-gold);
        }
        
        .hljs {
            background: var(--cri-bg-tertiary) !important;
            border-radius: var(--cri-radius-md);
            padding: 16px;
        }
        
        .markdown-body {
            color: var(--cri-text-secondary);
            line-height: 1.6;
        }
        
        .markdown-body h1 { 
            color: var(--cri-text-primary); 
            border-bottom: 1px solid var(--cri-border); 
            padding-bottom: 8px; 
        }
        .markdown-body h2 { color: var(--cri-text-primary); margin-top: 24px; }
        .markdown-body h3 { color: var(--cri-text-secondary); }
        .markdown-body code {
            background: var(--cri-bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            color: var(--cri-gold);
        }
        .markdown-body pre {
            background: var(--cri-bg-tertiary);
            padding: 16px;
            border-radius: var(--cri-radius-md);
            overflow-x: auto;
            border: 1px solid var(--cri-border);
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--cri-gold);
            padding-left: 16px;
            color: var(--cri-text-muted);
            font-style: italic;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }
        .markdown-body th,
        .markdown-body td {
            border: 1px solid var(--cri-border);
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background: var(--cri-bg-tertiary);
            font-weight: 600;
            color: var(--cri-text-primary);
        }
        
        /* Filter buttons */
        .filter-btn {
            transition: all var(--cri-transition-fast);
        }
        
        .filter-btn.active {
            background: var(--cri-gold-muted);
            border-color: var(--cri-gold);
            color: var(--cri-gold);
        }
        
        /* Category badges */
        .category-badge {
            background: var(--cri-gold-muted);
            color: var(--cri-gold);
            border: 1px solid rgba(212, 168, 83, 0.3);
        }
        
        /* Modal overlay */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-[var(--cri-border)] bg-[var(--cri-bg-secondary)] sticky top-0 z-50">
        <div class="max-w-full mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/" class="cri-logo cri-logo--small">
                        <div class="cri-logo__icon cri-logo__icon--small">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                            </svg>
                        </div>
                        <div class="cri-logo__text">
                            <span class="cri-logo__brand">Criativalia</span>
                            <span class="cri-logo__tagline">Entregas</span>
                        </div>
                    </a>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="openUploadModal()" class="cri-btn cri-btn--primary cri-btn--sm">
                        <i class="fas fa-plus mr-2"></i>Nova Entrega
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        <!-- Sidebar - Filtros -->
        <aside class="w-64 border-r border-[var(--cri-border)] bg-[var(--cri-bg-secondary)]/50 p-4 overflow-y-auto">
            <div class="space-y-6">
                <!-- Busca -->
                <div>
                    <label class="cri-label mb-2 block">Buscar</label>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[var(--cri-text-muted)]"></i>
                        <input type="text" id="searchInput" placeholder="Nome, tag, conteúdo..."
                            class="cri-input cri-input--with-icon w-full pl-10">
                    </div>
                </div>

                <!-- Categorias -->
                <div>
                    <label class="cri-label mb-2 block">Categorias</label>
                    <div class="space-y-1" id="categoryFilters">
                        <button class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item active flex items-center gap-2" data-category="all">
                            <i class="fas fa-th-large w-5 text-center"></i> Todas
                            <span class="ml-auto text-xs bg-[var(--cri-bg-tertiary)] px-2 py-0.5 rounded-full" id="count-all">0</span>
                        </button>
                        <button class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-category="strategy">
                            <i class="fas fa-chess w-5 text-center"></i> Estratégia
                            <span class="ml-auto text-xs bg-[var(--cri-bg-tertiary)] px-2 py-0.5 rounded-full" id="count-strategy">0</span>
                        </button>
                        <button class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-category="creative">
                            <i class="fas fa-palette w-5 text-center"></i> Criativos
                            <span class="ml-auto text-xs bg-[var(--cri-bg-tertiary)] px-2 py-0.5 rounded-full" id="count-creative">0</span>
                        </button>
                        <button class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-category="analysis">
                            <i class="fas fa-chart-line w-5 text-center"></i> Análises
                            <span class="ml-auto text-xs bg-[var(--cri-bg-tertiary)] px-2 py-0.5 rounded-full" id="count-analysis">0</span>
                        </button>
                        <button class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-category="code">
                            <i class="fas fa-code w-5 text-center"></i> Código
                            <span class="ml-auto text-xs bg-[var(--cri-bg-tertiary)] px-2 py-0.5 rounded-full" id="count-code">0</span>
                        </button>
                        <button class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-category="docs">
                            <i class="fas fa-file-alt w-5 text-center"></i> Documentação
                            <span class="ml-auto text-xs bg-[var(--cri-bg-tertiary)] px-2 py-0.5 rounded-full" id="count-docs">0</span>
                        </button>
                    </div>
                </div>

                <!-- Tipo de Arquivo -->
                <div>
                    <label class="cri-label mb-2 block">Tipo</label>
                    <div class="space-y-1" id="typeFilters">
                        <button class="type-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-type="md">
                            <i class="fab fa-markdown text-[var(--cri-info)] w-5 text-center"></i> Markdown
                        </button>
                        <button class="type-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-type="json">
                            <i class="fas fa-brackets-curly text-[var(--cri-gold)] w-5 text-center"></i> JSON
                        </button>
                        <button class="type-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-type="js">
                            <i class="fab fa-js text-yellow-300 w-5 text-center"></i> JavaScript
                        </button>
                        <button class="type-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-type="csv">
                            <i class="fas fa-table text-purple-400 w-5 text-center"></i> CSV / Planilha
                        </button>
                        <button class="type-btn w-full text-left px-3 py-2 rounded-lg text-sm cri-nav-item flex items-center gap-2" data-type="img">
                            <i class="fas fa-image text-[var(--cri-error)] w-5 text-center"></i> Imagem
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Lista de Entregas -->
        <main class="flex-1 overflow-y-auto p-6" id="deliverablesList">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-[var(--cri-text-primary)]" id="listTitle">Todas as Entregas</h2>
                <div class="text-sm text-[var(--cri-text-muted)]">
                    <span id="showingCount">0</span> de <span id="totalCount">0</span> entregas
                </div>
            </div>
            
            <div class="space-y-3" id="deliverablesContainer">
                <!-- Entregas serão inseridas aqui -->
            </div>
        </main>

        <!-- Preview Panel -->
        <aside class="w-[45%] preview-panel overflow-y-auto hidden" id="previewPanel">
            <div class="sticky top-0 bg-[var(--cri-bg-secondary)]/90 backdrop-blur border-b border-[var(--cri-border)] p-4 z-10">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div id="previewIcon" class="file-icon file-md">
                            <i class="fab fa-markdown"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-[var(--cri-text-primary)]" id="previewTitle">Nome do Arquivo</h3>
                            <p class="text-xs text-[var(--cri-text-muted)]" id="previewMeta">Categoria • Tamanho • Data</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="downloadCurrent()" class="cri-btn cri-btn--ghost cri-btn--icon-sm" title="Download">
                            <i class="fas fa-download"></i>
                        </button>
                        <button onclick="closePreview()" class="cri-btn cri-btn--ghost cri-btn--icon-sm" title="Fechar">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="p-6" id="previewContent">
                <!-- Conteúdo do preview -->
            </div>
        </aside>
    </div>

    <!-- Modal de Upload -->
    <div id="uploadModal" class="modal-overlay fixed inset-0 hidden items-center justify-center z-50">
        <div class="cri-modal max-w-lg w-full m-4">
            <div class="cri-modal__header">
                <h3 class="cri-modal__title">Nova Entrega</h3>
                <button onclick="closeUploadModal()" class="cri-modal__close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="uploadForm" class="cri-modal__body space-y-4">
                <div>
                    <label class="cri-label">Título</label>
                    <input type="text" name="title" required
                        class="cri-input w-full"
                        placeholder="Ex: Análise de LTV - Março 2026">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="cri-label">Categoria</label>
                        <select name="category" required class="cri-select w-full">
                            <option value="strategy">Estratégia</option>
                            <option value="creative">Criativos</option>
                            <option value="analysis">Análises</option>
                            <option value="code">Código</option>
                            <option value="docs">Documentação</option>
                        </select>
                    </div>
                    <div>
                        <label class="cri-label">Agente</label>
                        <select name="agent_id" class="cri-select w-full">
                            <option value="">Selecione...</option>
                            <option value="data_analyst">DATA_ANALYST</option>
                            <option value="copywriter">COPYWRITER</option>
                            <option value="designer">DESIGNER</option>
                            <option value="shopify_specialist">SHOPIFY_SPECIALIST</option>
                            <option value="dev_automation">DEV_AUTOMATION</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="cri-label">Tags (separadas por vírgula)</label>
                    <input type="text" name="tags"
                        class="cri-input w-full"
                        placeholder="ltv, análise, março">
                </div>
                
                <div>
                    <label class="cri-label">Conteúdo / Descrição</label>
                    <textarea name="content" rows="8" required
                        class="cri-textarea w-full code-font"
                        placeholder="Cole o conteúdo aqui (Markdown, JSON, código, etc.)"></textarea>
                </div>
                
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeUploadModal()"
                        class="cri-btn cri-btn--secondary">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="cri-btn cri-btn--primary">
                        Salvar Entrega
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Estado
        let deliverables = [];
        let currentFilter = 'all';
        let currentTypeFilter = null;
        let selectedDeliverable = null;

        // Categoria labels
        const categoryLabels = {
            strategy: 'Estratégia',
            creative: 'Criativos',
            analysis: 'Análises',
            code: 'Código',
            docs: 'Documentação'
        };

        // Icones por tipo
        const fileIcons = {
            md: { class: 'file-md', icon: 'fab fa-markdown' },
            json: { class: 'file-json', icon: 'fas fa-brackets-curly' },
            js: { class: 'file-js', icon: 'fab fa-js' },
            py: { class: 'file-py', icon: 'fab fa-python' },
            csv: { class: 'file-csv', icon: 'fas fa-table' },
            img: { class: 'file-img', icon: 'fas fa-image' },
            default: { class: 'file-code', icon: 'fas fa-file-code' }
        };

        // Detectar tipo de arquivo
        function detectType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['md', 'markdown'].includes(ext)) return 'md';
            if (['json'].includes(ext)) return 'json';
            if (['js', 'jsx', 'ts', 'tsx'].includes(ext)) return 'js';
            if (['py'].includes(ext)) return 'py';
            if (['csv'].includes(ext)) return 'csv';
            if (['png', 'jpg', 'jpeg', 'gif', 'svg'].includes(ext)) return 'img';
            return 'default';
        }

        // Carregar entregas
        async function loadDeliverables() {
            // PRIORIDADE 1: Usar dados reais do arquivo deliverables-data.js
            if (typeof REAL_DELIVERABLES !== "undefined" && REAL_DELIVERABLES.length > 0) {
                deliverables = REAL_DELIVERABLES;
                console.log("✅ Entregas carregadas do deliverables-data.js:", deliverables.length);
                renderDeliverables();
                updateCounts();
                return;
            }
            
            // PRIORIDADE 2: Tentar API (fallback)
            try {
                const response = await fetch('/api/deliverables');
                deliverables = await response.json();
                console.log("✅ Entregas carregadas da API:", deliverables.length);
            } catch (err) {
                console.error("❌ Erro ao carregar entregas:", err);
                deliverables = [];
            }
            renderDeliverables();
            updateCounts();
        }

        // Renderizar lista
        function renderDeliverables() {
            const container = document.getElementById('deliverablesContainer');
            const filtered = filterDeliverables();
            
            document.getElementById('showingCount').textContent = filtered.length;
            document.getElementById('totalCount').textContent = deliverables.length;
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="cri-empty-state py-12">
                        <i class="fas fa-inbox text-4xl mb-4"></i>
                        <p>Nenhuma entrega encontrada</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(d => {
                const typeInfo = fileIcons[d.type] || fileIcons.default;
                const date = new Date(d.created_at).toLocaleDateString('pt-BR');
                return `
                    <div class="deliverable-item cri-card p-4 flex items-center gap-4 ${selectedDeliverable?.id === d.id ? 'active' : ''}"
                         onclick="selectDeliverable('${d.id}')">
                        <div class="file-icon ${typeInfo.class}">
                            <i class="${typeInfo.icon}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <h4 class="font-medium text-[var(--cri-text-primary)] truncate">${d.title}</h4>
                                <span class="category-badge text-xs px-2 py-0.5 rounded-full">
                                    ${categoryLabels[d.category] || d.category}
                                </span>
                            </div>
                            <p class="text-sm text-[var(--cri-text-muted)] mt-1">
                                ${d.agent_name || 'Desconhecido'} • ${date} • ${d.size || ''}
                            </p>
                            ${d.tags?.length ? `
                                <div class="flex gap-1 mt-2 flex-wrap">
                                    ${d.tags.map(t => `<span class="text-xs bg-[var(--cri-bg-tertiary)] text-[var(--cri-text-muted)] px-2 py-0.5 rounded">#${t}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                        <i class="fas fa-chevron-right text-[var(--cri-text-muted)]"></i>
                    </div>
                `;
            }).join('');
        }

        // Filtrar entregas
        function filterDeliverables() {
            let filtered = deliverables;
            
            // Filtro de categoria
            if (currentFilter !== 'all') {
                filtered = filtered.filter(d => d.category === currentFilter);
            }
            
            // Filtro de tipo
            if (currentTypeFilter) {
                filtered = filtered.filter(d => d.type === currentTypeFilter);
            }
            
            // Busca
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) {
                filtered = filtered.filter(d => 
                    d.title.toLowerCase().includes(search) ||
                    d.tags?.some(t => t.toLowerCase().includes(search)) ||
                    d.content?.toLowerCase().includes(search)
                );
            }
            
            // Ordenar por data (mais recente primeiro)
            return filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }

        // Atualizar contagens
        function updateCounts() {
            const counts = {
                all: deliverables.length,
                strategy: deliverables.filter(d => d.category === 'strategy').length,
                creative: deliverables.filter(d => d.category === 'creative').length,
                analysis: deliverables.filter(d => d.category === 'analysis').length,
                code: deliverables.filter(d => d.category === 'code').length,
                docs: deliverables.filter(d => d.category === 'docs').length
            };
            
            Object.entries(counts).forEach(([key, count]) => {
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = count;
            });
        }

        // Selecionar entrega
        function selectDeliverable(id) {
            selectedDeliverable = deliverables.find(d => d.id === id);
            if (!selectedDeliverable) return;
            
            // Atualizar UI
            document.querySelectorAll('.deliverable-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Mostrar preview
            const panel = document.getElementById('previewPanel');
            panel.classList.remove('hidden');
            
            // Atualizar header
            document.getElementById('previewTitle').textContent = selectedDeliverable.title;
            const date = new Date(selectedDeliverable.created_at).toLocaleDateString('pt-BR');
            document.getElementById('previewMeta').textContent = 
                `${categoryLabels[selectedDeliverable.category]} • ${selectedDeliverable.size || 'N/A'} • ${date}`;
            
            // Icon
            const typeInfo = fileIcons[selectedDeliverable.type] || fileIcons.default;
            const iconEl = document.getElementById('previewIcon');
            iconEl.className = `file-icon ${typeInfo.class}`;
            iconEl.innerHTML = `<i class="${typeInfo.icon}"></i>`;
            
            // Renderizar conteúdo
            renderPreview();
        }

        // Renderizar preview
        function renderPreview() {
            const contentEl = document.getElementById('previewContent');
            const type = selectedDeliverable.type;
            const content = selectedDeliverable.content;
            
            if (type === 'md') {
                // Markdown
                contentEl.innerHTML = `<div class="markdown-body">${marked.parse(content)}</div>`;
            } else if (['js', 'py', 'json'].includes(type)) {
                // Código
                contentEl.innerHTML = `<pre><code class="language-${type}">${escapeHtml(content)}</code></pre>`;
                hljs.highlightAll();
            } else {
                // Texto plano
                contentEl.innerHTML = `<pre class="text-[var(--cri-text-secondary)] code-font text-sm whitespace-pre-wrap">${escapeHtml(content)}</pre>`;
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Fechar preview
        function closePreview() {
            document.getElementById('previewPanel').classList.add('hidden');
            selectedDeliverable = null;
            document.querySelectorAll('.deliverable-item').forEach(el => el.classList.remove('active'));
        }

        // Download
        function downloadCurrent() {
            if (!selectedDeliverable) return;
            
            const blob = new Blob([selectedDeliverable.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedDeliverable.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.${selectedDeliverable.type === 'md' ? 'md' : selectedDeliverable.type}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Modal de upload
        function openUploadModal() {
            const modal = document.getElementById('uploadModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeUploadModal() {
            const modal = document.getElementById('uploadModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('uploadForm').reset();
        }

        // Submit do formulário
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                title: formData.get('title'),
                category: formData.get('category'),
                agent_id: formData.get('agent_id'),
                tags: formData.get('tags').split(',').map(t => t.trim()).filter(t => t),
                content: formData.get('content'),
                type: detectType(formData.get('title')),
                size: `${(formData.get('content').length / 1024).toFixed(1)} KB`,
                created_at: new Date().toISOString()
            };
            
            try {
                const response = await fetch('/api/deliverables', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    deliverables.unshift({ ...data, id: result.id });
                    renderDeliverables();
                    updateCounts();
                    closeUploadModal();
                } else {
                    alert('Erro ao salvar entrega');
                }
            } catch (err) {
                // Adicionar localmente se API falhar
                deliverables.unshift({
                    ...data,
                    id: 'del_' + Date.now(),
                    agent_name: formData.get('agent_id') || 'Manual'
                });
                renderDeliverables();
                updateCounts();
                closeUploadModal();
            }
        });

        // Event listeners para filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                
                currentFilter = btn.dataset.category;
                renderDeliverables();
            });
        });

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const isActive = btn.classList.contains('active');
                document.querySelectorAll('.type-btn').forEach(b => {
                    b.classList.remove('active');
                });
                
                if (!isActive) {
                    btn.classList.add('active');
                    currentTypeFilter = btn.dataset.type;
                } else {
                    currentTypeFilter = null;
                }
                renderDeliverables();
            });
        });

        document.getElementById('searchInput').addEventListener('input', renderDeliverables);

        // Inicializar
        loadDeliverables();
    </script>
</body>
</html>
