version: '3.8'

services:
  # API do Marketing Agency
  agency-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: agency-api
    restart: always
    ports:
      - "7778:7778"
    volumes:
      - /opt/agency/database:/opt/agency/database
      - /opt/agency/logs:/opt/agency/logs
      - /opt/agency/uploads:/opt/agency/uploads
    environment:
      - NODE_ENV=production
      - PORT=7778
      - EVOLUTION_API_URL=http://agency-evolution:8080
    networks:
      - agency-network
    depends_on:
      - agency-evolution

  # Web Dashboard
  agency-web:
    image: nginx:alpine
    container_name: agency-web
    restart: always
    ports:
      - "7777:80"
    volumes:
      - /opt/agency/web:/usr/share/nginx/html:ro
      - /opt/agency/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agency-network

  # Evolution API (instância isolada)
  agency-evolution:
    image: atendai/evolution-api:v1.8.0
    container_name: agency-evolution
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SERVER_URL=http://72.62.140.110:8081
      - AUTHENTICATION_API_KEY=agency-evolution-2024
    volumes:
      - /opt/agency/evolution-store:/evolution/store
    networks:
      - agency-network

  # Redis para cache e filas (opcional, mas recomendado)
  agency-redis:
    image: redis:7-alpine
    container_name: agency-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - /opt/agency/redis-data:/data
    networks:
      - agency-network

networks:
  agency-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
