version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v1.8.0
    container_name: evolution-whatsapp
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=criativalia2024
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=false
      - DATABASE_PROVIDER=postgresql
    volumes:
      - evolution-data:/evolution/instances
    networks:
      - whatsapp-network

  rotator:
    image: node:18-alpine
    container_name: whatsapp-rotator
    restart: always
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - PORT=3333
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=criativalia2024
    working_dir: /app
    command: >
      sh -c "npm install express cors &&
      node -e \"const e=require('express')();
      e.use(require('cors')());
      e.get('/',(q,r)=>r.send('<h1>Criativalia WhatsApp Rotator</h1><p>Status: ONLINE</p><p>Evolution API: porta 8080</p>'));
      e.listen(3333,()=>console.log('Rotator on :3333'))\""
    depends_on:
      - evolution-api
    networks:
      - whatsapp-network

volumes:
  evolution-data:

networks:
  whatsapp-network:
    driver: bridge
