services:
  - type: web
    name: criativalia-runtime
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SHOPIFY_SHOP
        value: criativalia.myshopify.com
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
